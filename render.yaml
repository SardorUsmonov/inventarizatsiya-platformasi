services:
  - type: web
    name: inventarizatsiya-platformasi
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_PATH
        value: /app/data/inventory.sqlite
      - key: AUTO_BACKUP_INTERVAL_MS
        value: 10800000
      - key: ADMIN_FULL_NAME
        value: Administrator
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
